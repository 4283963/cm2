server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: reconciliation-service
  datasource:
    url: jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

reconciliation:
  file-storage-path: /tmp/reconciliation-files
  batch-size: 1000
  auto-adjust-threshold: 1.00
  auto-adjust-enabled: true
  small-profit-loss-account: 660201
  finance-operator: SYSTEM_AUTO
  thread-pool:
    core-size: 4
    max-size: 8
    queue-capacity: 100

logging:
  level:
    com.bank.reconciliation: INFO
    org.hibernate.SQL: WARN
